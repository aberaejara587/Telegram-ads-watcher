<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Premium App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {background:#050a14;color:white;font-family:Poppins;margin:0;overflow:hidden;}
.page{display:none;}
.page.active{display:block;}
.nav-item{color:#64748b;}
.nav-item.active{color:#00ffcc;}
.glass-card{background:rgba(255,255,255,0.03);border-radius:20px;padding:10px;}
</style>
</head>

<body>

<div class="p-4">

<h3 id="user-name">User</h3>
<h1>$<span id="user-balance">0.00</span></h1>
<p>Rank: <span id="user-rank-val">Bronze</span></p>
<p>My Position: <span id="my-rank-pos">#-</span></p>

<button onclick="watchAd()">+0.10</button>
<button onclick="boostRank()">Boost</button>

<div id="leaderboard" class="page active">
<h3>Leaderboard</h3>
<div id="member-list"></div>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// --- STATE ---
let balance = parseFloat(localStorage.getItem('gem_bal')) || 0;
let allUsers = JSON.parse(localStorage.getItem('gem_users')) || [];

// --- INIT USER ---
function initUser(){
    const user = tg.initDataUnsafe?.user;

    const currentUser = {
        id: user?.id || "guest_" + Math.random(),
        name: user?.first_name || "Guest",
        balance: balance
    };

    let exists = allUsers.find(u => u.id === currentUser.id);

    if(!exists){
        allUsers.push(currentUser);
    }

    localStorage.setItem('gem_users', JSON.stringify(allUsers));
}

// --- UPDATE BALANCE UI ---
function updateUI(){
    document.getElementById('user-balance').innerText = balance.toFixed(2);

    let rank="Bronze";
    if(balance>10) rank="Silver";
    if(balance>50) rank="Gold";
    if(balance>200) rank="Diamond";

    document.getElementById('user-rank-val').innerText = rank;

    localStorage.setItem('gem_bal', balance);

    syncUserBalance();
    generateLeaderboard();
}

// --- SYNC USER ---
function syncUserBalance(){
    const user = tg.initDataUnsafe?.user;

    allUsers = allUsers.map(u=>{
        if(u.id === user?.id){
            return {...u, balance: balance};
        }
        return u;
    });

    localStorage.setItem('gem_users', JSON.stringify(allUsers));
}

// --- LEADERBOARD ---
function generateLeaderboard(){
    const list = document.getElementById('member-list');

    const sorted = allUsers.sort((a,b)=>b.balance-a.balance);

    let html="";

    sorted.forEach((u,i)=>{
        html+=`
        <div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #333;">
            <span>#${i+1} ${u.name}</span>
            <span>$${u.balance.toFixed(2)}</span>
        </div>`;
    });

    list.innerHTML = html;

    const user = tg.initDataUnsafe?.user;
    const myIndex = sorted.findIndex(u=>u.id===user?.id);

    document.getElementById('my-rank-pos').innerText =
        myIndex>=0 ? "#"+(myIndex+1) : "#-";
}

// --- ACTIONS ---
function watchAd(){
    balance += 0.10;
    updateUI();
}

function boostRank(){
    balance += 0.01;
    updateUI();
}

// --- USER INFO ---
const user = tg.initDataUnsafe?.user;
document.getElementById('user-name').innerText = user?.first_name || "Guest";

// --- START ---
initUser();
updateUI();

</script>

</body>
</html>
